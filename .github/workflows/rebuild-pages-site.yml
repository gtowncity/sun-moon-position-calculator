name: Rebuild GitHub Pages site

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - ".github/workflows/rebuild-pages-site.yml"

permissions:
  contents: write

jobs:
  build-pages:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Pages site
        run: npm run build:pages

      - name: Commit rebuilt site
        run: |
          if git diff --quiet -- site; then
            echo "site is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site
          git commit -m "Rebuild GitHub Pages site"
          git push
