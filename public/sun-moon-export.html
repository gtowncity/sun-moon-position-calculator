<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonne Mond Rohdaten Export</title>
  <style>
    :root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#f2cc60}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;font-size:14px}.wrap{max-width:980px;margin:0 auto;padding:22px}h1{margin:0 0 6px;font-size:22px}p{margin:0 0 16px;color:var(--muted)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{border:1px solid var(--line);background:var(--panel);padding:14px;border-radius:8px}label{display:block;margin:8px 0 4px;color:var(--muted);font-size:12px}input,button{width:100%;border:1px solid var(--line);border-radius:7px;background:#0d1117;color:var(--text);padding:9px;font:inherit}button{cursor:pointer;background:var(--accent);color:#111;font-weight:700}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.status{margin-top:12px;white-space:pre-wrap;color:var(--muted);line-height:1.4}.preview{margin-top:14px;overflow:auto;border:1px solid var(--line);border-radius:8px;max-height:320px}.preview table{width:100%;border-collapse:collapse;font-size:12px}.preview th,.preview td{border-bottom:1px solid var(--line);padding:7px 8px;text-align:left;white-space:nowrap}.preview th{background:#21262d;color:#fff;position:sticky;top:0}@media(max-width:760px){.grid,.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Sonne/Mond Rohdaten Export</h1>
    <p>Exportiert den gewaehlten Standort und Zeitraum als Excel-Rohdaten. Intervall: fest 1 Minute. Objekte: nur Sonne und Mond.</p>
    <section class="grid">
      <div class="card">
        <h2>Standort</h2>
        <label>Name</label><input id="placeLabel" value="Geiselhoering" />
        <div class="row"><div><label>Breite</label><input id="lat" value="48.8290596" /></div><div><label>Laenge</label><input id="lon" value="12.3939088" /></div></div>
        <label>Hoehe Meter</label><input id="elev" value="360" />
      </div>
      <div class="card">
        <h2>Zeitraum</h2>
        <div class="row"><div><label>Startdatum</label><input id="startDate" value="2026-07-10" /></div><div><label>Startzeit</label><input id="startTime" value="16:00" /></div></div>
        <div class="row"><div><label>Enddatum</label><input id="endDate" value="2026-07-11" /></div><div><label>Endzeit</label><input id="endTime" value="06:00" /></div></div>
        <button id="exportBtn" style="margin-top:12px">Excel Rohdaten erzeugen</button>
        <div class="status" id="status">Bereit. Intervall ist 1 Minute.</div>
      </div>
    </section>
    <section class="preview" id="preview"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script type="module">
    import { Body, Equator, Horizon, Illumination, Observer } from 'https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/+esm';

    const AU_KM = 149597870.7;
    const $ = id => document.getElementById(id);
    const number = value => Number(String(value).replace(',', '.'));
    const pad = value => String(value).padStart(2, '0');
    const localLabel = date => `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    const round = (value, digits=8) => Number.isFinite(value) ? Number(value.toFixed(digits)) : null;

    function config(){
      return {
        place: $('placeLabel').value.trim() || 'Standort',
        lat: number($('lat').value),
        lon: number($('lon').value),
        elev: number($('elev').value),
        start: new Date(`${$('startDate').value}T${$('startTime').value}:00`),
        end: new Date(`${$('endDate').value}T${$('endTime').value}:00`)
      };
    }

    function bodyRow(index, cfg, date, body, name){
      const observer = new Observer(cfg.lat, cfg.lon, cfg.elev);
      const equ = Equator(body, date, observer, true, true);
      const apparent = Horizon(date, observer, equ.ra, equ.dec, 'normal');
      const geometric = Horizon(date, observer, equ.ra, equ.dec, null);
      const illum = body === Body.Moon ? Illumination(Body.Moon, date) : null;
      return {
        index,
        standort: cfg.place,
        breite: cfg.lat,
        laenge: cfg.lon,
        hoehe_meter: cfg.elev,
        lokale_zeit: localLabel(date),
        objekt: name,
        azimut_grad: round(apparent.azimuth),
        hoehe_scheinbar_grad: round(apparent.altitude),
        hoehe_geometrisch_grad: round(geometric.altitude),
        zenit_scheinbar_grad: round(90 - apparent.altitude),
        rektaszension_stunden: round(equ.ra),
        deklination_grad: round(equ.dec),
        mond_distanz_km: body === Body.Moon ? round(equ.dist * AU_KM, 3) : null,
        mond_beleuchtung_prozent: illum ? round(illum.phase_fraction * 100, 6) : null
      };
    }

    function rows(){
      const cfg = config();
      if(!Number.isFinite(cfg.lat) || cfg.lat < -90 || cfg.lat > 90) throw new Error('Breite muss zwischen -90 und 90 liegen.');
      if(!Number.isFinite(cfg.lon) || cfg.lon < -180 || cfg.lon > 180) throw new Error('Laenge muss zwischen -180 und 180 liegen.');
      if(!(cfg.end >= cfg.start)) throw new Error('Ende muss nach Start liegen.');
      const out = [];
      let date = new Date(cfg.start);
      let index = 1;
      while(date <= cfg.end){
        out.push(bodyRow(index++, cfg, date, Body.Sun, 'Sonne'));
        out.push(bodyRow(index++, cfg, date, Body.Moon, 'Mond'));
        if(out.length > 1048000) throw new Error('Zeitraum ist fuer Excel zu lang.');
        date = new Date(date.getTime() + 60000);
      }
      return { cfg, out };
    }

    function renderPreview(out){
      const head = ['lokale_zeit','objekt','azimut_grad','hoehe_scheinbar_grad','hoehe_geometrisch_grad','mond_beleuchtung_prozent','mond_distanz_km'];
      $('preview').innerHTML = `<table><thead><tr>${head.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${out.slice(0,80).map(row => `<tr>${head.map(h => `<td>${row[h] ?? ''}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
    }

    function exportExcel(){
      try{
        $('status').textContent = 'Berechnung laeuft...';
        const { cfg, out } = rows();
        renderPreview(out);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(out), 'Rohdaten_1min');
        XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet([
          { key: 'standort', value: cfg.place },
          { key: 'start', value: localLabel(cfg.start) },
          { key: 'ende', value: localLabel(cfg.end) },
          { key: 'intervall_minuten', value: 1 },
          { key: 'objekte', value: 'Sonne und Mond' },
          { key: 'zeilen', value: out.length }
        ]), 'Metadata');
        XLSX.writeFile(workbook, `sonne-mond-rohdaten-${cfg.place.replaceAll(' ','_')}-1min.xlsx`);
        $('status').textContent = `Excel erzeugt: ${out.length} Zeilen.`;
      }catch(error){
        $('status').textContent = error.message || 'Export fehlgeschlagen.';
      }
    }

    $('exportBtn').addEventListener('click', exportExcel);
  </script>
</body>
</html>
